<aside class="sidebar" [class.collapsed]="collapsed()">

  <div class="sidebar-brand">
    <span class="brand-mark">L</span>
    <span class="brand-name">Ledger</span>
  </div>

  <nav class="sidebar-nav">
    @for(item of menuItems(); track item.route) {
      <a [routerLink]="item.route" routerLinkActive="active" class="nav-item" [title]="item.label">
        <span class="material-symbols-outlined nav-icon">{{ item.icon }}</span>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    }
  </nav>

  <div class="sidebar-footer">
    <button
      class="toggle-btn"
      (click)="toggle()"
      [attr.aria-label]="collapsed() ? 'Expandir menu' : 'Recolher menu'"
    >
      <i class="pi" [class.pi-chevron-right]="collapsed()" [class.pi-chevron-left]="!collapsed()"></i>
    </button>
  </div>

</aside>
