<p-dialog
  [visible]="viewer.visible()"
  (visibleChange)="$event ? null : onHide()"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '90vw', maxWidth: '1100px', height: '90vh', display: 'flex', flexDirection: 'column' }"
  styleClass="file-viewer-dialog"
  [closeOnEscape]="true"
>
  <ng-template pTemplate="header">
    <span class="fv-title">
      <span class="ms" style="font-size: 22px;">picture_as_pdf</span>
      Visualizar arquivo
    </span>
  </ng-template>

  <div class="fv-body">
    @if (viewer.loading()) {
      <div class="fv-loading">
        <p-progressSpinner strokeWidth="4" />
      </div>
    } @else if (viewer.safeUrl()) {
      @if (isImage) {
        <img [src]="viewer.safeUrl()!" class="fv-image" alt="Arquivo" />
      } @else {
        <iframe [src]="viewer.safeUrl()!" class="fv-iframe" title="Arquivo"></iframe>
      }
    }
  </div>
</p-dialog>
